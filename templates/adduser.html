{% extends "base.html" %} {% block title %}用户管理{% endblock %} {% block content %}
<div class="center">
    <h2>用户管理</h2>
</div>
<br />
<div class="center">
    <a class="btn btn-primary" data-bs-toggle="offcanvas" href="#AddUser" role="button" aria-controls="AddUser">
        添加用户
    </a>
</div>
<div class="content">
    <table class="table">
        <thead>
            <tr>
                <th>用户名</th>
                <th>姓名</th>
                <th>密码</th>
                <th>删除</th>
            </tr>
        </thead>
        <tbody>
            {% for i in users %}
            <tr>
                <td>{{ i.uid }}</td>
                <td>{{ i.name }}</td>
                <td>
                    <a data-bs-toggle="offcanvas" onclick="editItem('{{ i.uid }}')" href="#EditPasswd" role="button" aria-controls="EditPasswd">
                        修改
                    </a>
                </td>
                <td>
                    <a href="{{ url_for('AddUser.adduser', action='del', target=i.uid, csrf=csrf) }}">
                        删除
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<div class="offcanvas offcanvas-start" tabindex="-1" id="EditPasswd" aria-labelledby="EditPasswdLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="EditPasswdLabel">设置密码</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <form method="POST" class="mb-3" onsubmit="return SubmitCheck()">
            <div class="mb-3">
                <label for="passwd">密码</label>
                <input id="user" type="hidden" name="user">
                <input id="passwd-fake" class="form-control">
                <input id="passwd" type="hidden" name="passwd">
                <input name="csrf" type="hidden" value="{{ csrf }}">
            </div>
            <button type="submit" class="btn btn-primary">
                设置
            </button>
        </form>

    </div>
</div>
<div class="offcanvas offcanvas-start" tabindex="-1" id="AddUser" aria-labelledby="AddUserLabel">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="AddUserLabel">添加用户</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <div class="center">
            <p>
                逗号或空格分隔，每行一个用户，格式为：用户名、姓名、密码。
            </p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label for="users" class="control-label">用户</label>
                <textarea id="users" type="text" name="users" class="form-control" rows="10" required></textarea>
            </div>
            <br />
            <input name="csrf" type="hidden" value="{{ csrf }}">
            <div class="mb-3">
                <label for="type" class="control-label">管理员</label>
            </div>
            <div class="mb-3">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="type" id="check1" value="1">
                    <label class="form-check-label" for="check1">是</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="type" id="check2" value="0" checked>
                    <label class="form-check-label" for="check2">否</label>
                </div>
            </div>
            <div class="center">
                <button type="submit" class="btn btn-primary">提交</button>
            </div>
        </form>
    </div>
</div>
<script src="{{ url_for('static', filename='md5.min.js') }}"></script>
<script>
    function editItem(uid) {
        var uid_now = uid;
        $("input#user").val(uid_now);
    }

    function SubmitCheck() {
        $('#passwd').val(md5($('#passwd-fake').val()));
        return true;
    }
</script>

{% endblock %}
